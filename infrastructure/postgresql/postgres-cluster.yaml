apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: synapse-postgres
  namespace: matrix
spec:
  teamId: "matrix"
  
  # Number of PostgreSQL instances (spread across zones)
  numberOfInstances: 3
  
  users:
    synapse:
      - superuser
      - createdb
  
  databases:
    synapse: synapse
  
  postgresql:
    version: "15"
    parameters:
      # Performance tuning
      max_connections: "500"
      shared_buffers: "2GB"
      effective_cache_size: "6GB"
      maintenance_work_mem: "512MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"  # SSD
      effective_io_concurrency: "200"
      work_mem: "4MB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      max_worker_processes: "4"
      max_parallel_workers_per_gather: "2"
      max_parallel_workers: "4"
      max_parallel_maintenance_workers: "2"
      
      # Logging
      log_min_duration_statement: "1000"  # Log queries >1s
      log_checkpoints: "on"
      log_connections: "on"
      log_disconnections: "on"
      log_lock_waits: "on"
      
      # Replication
      wal_level: "replica"
      max_wal_senders: "10"
      max_replication_slots: "10"
      hot_standby: "on"
      
      # Extensions for Matrix
      shared_preload_libraries: "pg_stat_statements"
  
  volume:
    size: 100Gi
    storageClass: local-path  # Or your storage class
  
  # Patroni configuration
  patroni:
    initdb:
      encoding: "UTF8"
      locale: "en_US.UTF-8"
      data-checksums: "true"
    
    pg_hba:
      - hostssl all all 0.0.0.0/0 md5
      - host    all all 0.0.0.0/0 md5
    
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 33554432  # 32MB
    
    slots:
      permanent_replication_slots: {}
  
  # Resource limits
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  
  # Spread pods across zones
  podAntiAffinity: true
  podAntiAffinityTopologyKey: "topology.kubernetes.io/zone"
  
  # Connection pooler (PgBouncer)
  enableConnectionPooler: true
  connectionPooler:
    numberOfInstances: 3
    mode: transaction
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  # Automated backups
  enableLogicalBackup: true
  logicalBackupSchedule: "30 0 * * *"  # Daily at 00:30
  
  # Master load balancer
  enableMasterLoadBalancer: true
  
  # Replica load balancer
  enableReplicaLoadBalancer: true
  
  # Monitoring
  enableShmVolume: true
  
  sidecars:
    - name: exporter
      image: quay.io/prometheuscommunity/postgres-exporter:latest
      ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      env:
        - name: DATA_SOURCE_URI
          value: "localhost/synapse?sslmode=disable"
        - name: DATA_SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: synapse.synapse-postgres.credentials.postgresql.acid.zalan.do
              key: username
        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: synapse.synapse-postgres.credentials.postgresql.acid.zalan.do
              key: password
