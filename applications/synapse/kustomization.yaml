apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: matrix

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - ingress.yaml

commonLabels:
  app: synapse
  app.kubernetes.io/name: synapse
  app.kubernetes.io/component: homeserver
  app.kubernetes.io/part-of: maetwix-cluster

configMapGenerator:
  - name: synapse-config
    files:
      - homeserver.yaml
      - log.config.yaml

images:
  - name: matrixdotorg/synapse
    newTag: v1.98.0  # Update this to change Synapse version
