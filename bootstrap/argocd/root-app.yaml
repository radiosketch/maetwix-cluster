apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/radiosketch/maetwix-cluster.git
    targetRevision: HEAD
    path: applications-set
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# ApplicationSet for infrastructure
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/radiosketch/maetwix-cluster.git
        revision: HEAD
        directories:
          - path: infrastructure/*
  
  template:
    metadata:
      name: '{{path.basename}}'
      labels:
        app.kubernetes.io/part-of: infrastructure
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/radiosketch/maetwix-cluster.git
        targetRevision: HEAD
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: infrastructure
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            maxDuration: 1m
---
# ApplicationSet for Matrix applications
apiVersion: argoproj.io/v1alpha1
