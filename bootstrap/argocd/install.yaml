apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Install ArgoCD
# This uses the official stable manifest
# kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

# Or use this for HA setup:
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 5.51.6
    chart: argo-cd
    helm:
      values: |
        global:
          domain: argocd.maetwix.org
        
        server:
          replicas: 2
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - argocd.maetwix.org
            tls:
              - secretName: argocd-tls
                hosts:
                  - argocd.maetwix.org
          
        repoServer:
          replicas: 2
        
        applicationSet:
          enabled: true
        
        configs:
          params:
            server.insecure: false
            server.rootpath: /
          
          cm:
            url: https://argocd.maetwix.org
            
            # Enable automated sync
            application.instanceLabelKey: argocd.argoproj.io/instance
            
            # Timeout for sync operations
            timeout.reconciliation: 180s
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
